    <div class="post-title">
        <p>
            Dual System Time Sync
        </p>
        <hr>
    </div>
    <div class="post-content">
        <p>将Windows平台使用 UTC，而非让 Linux 使用地方时。Windows 使用 UTC 后，禁用 Windows 的时间同步功能，以防 Windows 错误设置硬件时间。</p>
<p>使用<code>regedit</code>，新建如下 DWORD 值，并将其值设为十六进制的<code>1</code>。</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\TimeZoneInformation\RealTimeIsUniversal</span><br></pre></td></tr></table></figure>

<p>也可以用管理员权限启动命令行来完成：</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">reg add <span class="string">&quot;HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\TimeZoneInformation&quot;</span> /v RealTimeIsUniversal /d <span class="number">1</span> /t REG_DWORD /f</span><br></pre></td></tr></table></figure>

<p>如果 Windows 根据夏令时更新时钟，可以允许。时钟仍然是 UTC，仅是显示时间会改变。</p>

    </div>
